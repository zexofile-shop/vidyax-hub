<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VidyaX — Redirecting</title>
    <script>
      var redirectPath = window.location.pathname + window.location.search + window.location.hash;
      sessionStorage.setItem("vidyax_redirect", redirectPath);
      window.location.replace("/");
    </script>
  </head>
  <body>
    <p>Redirecting to VidyaX...</p>
  </body>
</html>
