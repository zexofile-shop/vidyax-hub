<!DOCTYPE html>
<html lang="en">
<head>

  <title>VidyaX - Free Learning App</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f8fbff, #eaf1ff);
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .box {
      padding: 28px;

    .tag {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 18px;
      border-radius: 999px;
      background: #2563eb;
      color: white;

<body>
  <div class="box">
    <h1>VidyaX</h1>
